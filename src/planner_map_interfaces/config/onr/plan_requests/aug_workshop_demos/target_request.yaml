max_planning_time: 5.0
maximum_range: 10000.0
desired_speed: 28.0
counter_detection_range: 50.0
min_loiter_radius: 500.0
wind_speed: 
  x: 60.0
  y: 0.0
  z: 0.0

# drone
start_pose: 
  position: 
    x: 2000.0
    y: 500.0
    z: 110.0
  orientation: 
    x: 0.0
    y: 0.0
    z: 1.0
    w: 0.0
