# camera parameters
sensor_params_path: $(find planner_map_interfaces)/config/$(arg config)
# hacky numbers
width: 3.2  
height: 2.4
focal_length: 3.5

camera_intrinsics:  # SEEK CAMERA
  fx: 338.136183  # focal length x
  fy: 336.039570  # focal length y
  cx: 160.829  # center x
  cy: 112.614  # center y
  s: 0   # skew

pitch: 0.78539816339  # 45 deg down
# pitch: 1.57079632679 # 0 radians is forward, pi/2 radians is down 1.57079632679, 10 degree is 0.174533

# observation model parameters
model_count: 1 # number of sensor models to use
# the maximum range for each sensor. Used to speed up computation. 
# The maximum of this vector is used in most methods, so keep the list to a minimum necessary
max_range: 
  - 1000.0
