# ICRA Scenario 3
# Targets in circle around UAV traveling outward. Same as 2 but targets have different
# uncertainties.
# Greedy should hop around more and expend its budget quickly while MCTS should
# create paths that follow the circle more 

# Notes
# Could mess with the variances more
# Could adjust budget



# planning parameters
clear_tree: True
max_planning_time: 10.0
maximum_range: 10000.0
desired_speed: 50.0
counter_detection_range: 0.0
min_loiter_radius: 500.0
wind_speed: 
  x: 0.0
  y: 0.0
  z: 0.0

# drone
start_pose: 
  position: 
    x: 5000.0
    y: 5000.0
    z: 110.0
  orientation: 
    x: 0.0
    y: 0.0
    z: 0.0
    w: 1.0
current_speed: 
  x: 12.0
  y: 9.0
  z: 0.1

# sensor
sensor_constraints: 
  min_direction: 
    x: -2.0
    y: -2.0
    z: -2.0
  max_direction: 
    x: -2.0
    y: -2.0
    z: -2.0
  min_field_of_regard_horizontal: -2.0
  max_field_of_regard_horizontal: -1.0
  min_field_of_regard_vertical: -2.0
  max_field_of_regard_vertical: -1.0

# map
