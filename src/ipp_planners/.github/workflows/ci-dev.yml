name: build-unit-test-dev

on:
  push:
    branches:
      - develop
      - github-workflow
      - actions-testing
  pull_request:
    types: [opened, reopened]
    branches:
      - develop

jobs:
  build-dev:
    runs-on: [self-hosted]
    container: 
      image: bradygm/ipp-github-build
      # options: --gpus all
      # volumes: 
      #  - /project:/project
      #  - azuredvc:/azuredvc
    if: "always() && !contains(github.event.head_commit.message, 'DO-NOT-RUN')"
    # needs: sharedvol
    steps:
    # - uses: actions/checkout@v2
    # - uses: actions/setup-python@v2
    #   with:
    #     python-version: '3.8'
    - name: update-github-repos
      env:
        repo_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        GITHUB_TOKEN:  ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        # PERSONAL_ACCESS_TOKEN:  ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      #   TB_CREDENTIALS: ${{ secrets.TB_CREDENTIALS }}
      #   AZURE_CONNECTION_STRING: ${{ secrets.AZURE_CONNECTION_STRING }}
      run: |
        # One time commands for setting up the container
        # apt update && apt install  openssh-server -y
        # mkdir /root/.ssh && chmod 0700 /root/.ssh && ssh-keyscan -t rsa bitbucket.org >> /root/.ssh/known_hosts && ssh-keyscan -t rsa github.com >> /root/.ssh/known_hosts
        # apt-get update && apt-get install --no-install-recommends python3-vcstool -y
        git config --global user.name "Github Action"
        git config --global user.email "github@github.com"
        git config --global credential.helper '!f() { sleep 1; echo "username=${{ github.actor }}"; echo "password=${GITHUB_TOKEN}"; }; f'
        echo "setup git config successfully"
        echo "$(pwd)"
        echo "$(ls)"
        
        if [ ! -d ws/src/ipp_planners ]; then
          echo "ipp_planners repo does not exist."
          mkdir -p ws/src
          cd ws/src
          git clone git@github.com:castacks/ipp_planners.git
          cd ../../
        fi
        
        cd ws/src/ipp_planners
        git fetch
        git checkout ${GITHUB_REF##*/}
        git pull
        cd ../
        echo "Cloning other repos"
        temp_file=$(mktemp)
        bash ipp_planners/scripts/ssh_to_http_repos.bash ipp_planners/ws_develop.repos > $temp_file
        vcs import < $temp_file
        vcs pull
        cd ipp_planners
        git checkout ${GITHUB_REF##*/}
        git pull


    - name: build workspace
      run: |
        cd ws/
        catkin config --extend /opt/ros/$ROS_DISTRO 
        catkin build
        catkin build --make-args tests -- ipp_planners



        #Commit results and artifacts to azure and git
        # dvc push
        # git pull
        # git add data/MNIST.dvc dvc.lock
        # git add *.json
        # git config --global user.name "Github Action"
        # git config --global user.email "github@github.com"
        # git diff-index --quiet HEAD || git commit -m "DO-NOT-RUN. Artifacts from run."
        # git push

        
  benchmark:
    name: Performance regression check
    runs-on: [self-hosted]
    container: 
      image: bradygm/ipp-github-build
    if: "!contains(github.event.head_commit.message, 'DO-NOT-RUN')"
    needs: build-dev
    steps:
      # Run benchmark with `go test -bench` and stores the output to a file
      - name: Run benchmark
        shell: bash
        run: |
          source /opt/ros/noetic/setup.bash
          source ws/devel/setup.bash
          roscore &
          sleep 3
          ./ws/devel/lib/ipp_planners/ipp_planners-benchmark --benchmark_format=json | tee benchmark_result.json
          pkill rosmaster
          git config --global user.name "Github Action"
          git config --global user.email "github@github.com"

      # Download previous benchmark result from cache (if exists)
      - name: Download previous benchmark data
        uses: actions/cache@v3
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark
      # Run `github-action-benchmark` action
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          # What benchmark tool the output.txt came from
          tool: 'googlecpp'
          # Where the output from the benchmark tool is stored
          output-file-path: benchmark_result.json
          # Where the previous data file is stored
          external-data-json-path: ./cache/benchmark-data.json
          # Workflow will fail when an alert happens
          fail-on-alert: false
          # GitHub API token to make a commit comment
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          # Enable alert commit comment
          comment-on-alert: true
          # Mention @rhysd in the commit comment
          alert-comment-cc-users: '@bradygm'
          alert-threshold: 150%
          comment-always: true
      # Upload the updated cache file for the next job by actions/cache


  unit-tests:
    name: Unit tests
    runs-on: [self-hosted]
    container: 
      image: bradygm/ipp-github-build
    if: "!contains(github.event.head_commit.message, 'DO-NOT-RUN')"
    needs: build-dev
    steps:       
      - name: Run unit tests
        shell: bash
        run: |
          source /opt/ros/noetic/setup.bash
          source ws/devel/setup.bash
          roscore &
          sleep 1
          ./ws/devel/lib/ipp_planners/ipp_planners-test

      
