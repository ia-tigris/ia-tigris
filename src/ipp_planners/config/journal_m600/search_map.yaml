node_loop_hz: 5  # in seconds

# Can limit the rate of publishing the map to the search belief map visualization
# Useful to limit the size of bags or when limited bandwidth
search_belief_publishing_every_n_loops: 1  # number of loops.

plan_request_topic: "planner/plan_request"
agent_odom_topic: "agent_pose" # /uav1/odometry

map_resolution: 10.0
map_resolution_num: 100 # used if proportional parameters is set in tigris.yaml
confidence_threshold: 0.5

# Time based rewards parameters (linear function with a floor)
time_decay_slope: -0.008 # must be negative. Decrease in scale value per second
time_decay_floor: 0.5 # minimum scalar value from time decay

# Visualization
update_from_image_projection: false
visualization: true
visualization_alpha: 0.3

#metrics
pub_search_map_metrics: true