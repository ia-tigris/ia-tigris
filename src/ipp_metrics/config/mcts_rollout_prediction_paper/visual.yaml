# Testing parameters for MC testing, quantitative results collection

# each person set these to be the same values
min_num_targets: 6
max_num_targets: 6

min_target_cov: 2000
max_target_cov: 10000
min_head_cov: 0.5
max_head_cov: 1.2
min_speed_cov: 0.0
max_speed_cov: 2.0
min_target_speed: 5.0
max_target_speed: 8.0

map_bounds: 3000

planner_types:
# - greedy
# - random
# - rimcts
- limcts
# - rpmcts
# - lpmcts

drone_speed: 50.0
planning_time: 40.0 # sample?
# hold budget constant
min_budget: 30000
max_budget: 30000 

number_of_trials: 20

# Visualization options
vis_particle_sparse: false
vis_particle_sparse_rate: 10
vis_particle_size: 100
vis_path_width: 50

# If you want to execute the plan in sim or not. 
# Set to true for collecting quant results, set to false for generating training data
execute_plan: True

