name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync submodule URLs
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/ipp_planners/Dockerfile
          target: test
          load: true
          tags: ia-tigris-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests
        run: |
          docker run --rm --entrypoint /bin/bash ia-tigris-ci:latest -lc '
            set -e
            source /opt/ros/noetic/setup.bash
            source /workspace/devel/setup.bash
            roscore &
            ROSCORE_PID=$!
            trap "kill $ROSCORE_PID" EXIT
            sleep 2
            rosrun trochoids trochoids-test
            rosrun ipp_planners ipp_planners-test
          '
