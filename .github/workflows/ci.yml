name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync submodule URLs
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Build test image
        run: docker build --target test -f src/ipp_planners/Dockerfile -t ia-tigris-ci .

      - name: Run unit tests
        run: |
          docker run --rm ia-tigris-ci /bin/bash -lc '
            set -e
            source /opt/ros/noetic/setup.bash
            source /workspace/devel/setup.bash
            roscore &
            ROSCORE_PID=$!
            trap "kill $ROSCORE_PID" EXIT
            sleep 2
            rosrun trochoids trochoids-test
            rosrun ipp_planners ipp_planners-test
          '
